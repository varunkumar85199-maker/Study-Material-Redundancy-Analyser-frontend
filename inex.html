<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudySync — Smart PDF Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

<style>

/* ROOT COLORS */
:root {
  --bg: #0d0d12;
  --surface: #14141e;
  --surface2: #1c1c2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #7c6cfa;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,108,250,0.25);
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --text: #f1f0ff;
  --muted: #8b8aaa;
  --muted2: #5a5978;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Noise Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 0;
}

/* Glow Blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}

.blob1 {
  width: 400px;
  height: 400px;
  background: rgba(124,108,250,0.12);
  top: -100px;
  left: -80px;
}

.blob2 {
  width: 300px;
  height: 300px;
  background: rgba(52,211,153,0.08);
  bottom: -60px;
  right: -60px;
}

.wrapper {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 28px 0 36px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 40px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: "Syne", sans-serif;
  font-size: 22px;
  font-weight: 800;
}

.logo-dot {
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.8); opacity: 0.6; }
}

.status-pill {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 999px;
  border: 0.5px solid var(--border2);
  background: var(--surface);
  color: var(--muted);
}

.status-pill span {
  color: var(--green);
  margin-right: 6px;
}

/* SECTION TITLE */
.section-title {
  font-family: "Syne", sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 16px;
}

/* UPLOAD BOX */
.upload-area {
  border: 1.5px dashed var(--border2);
  border-radius: 16px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  background: var(--surface);
}

.upload-area:hover {
  border-color: var(--accent);
  background: rgba(124,108,250,0.06);
}

.upload-area input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: rgba(124,108,250,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

.upload-types {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 16px;
}

.type-badge {
  font-size: 11px;
  border-radius: 999px;
  padding: 3px 10px;
  border: 0.5px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
}

/* FILE LIST */
.file-list { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }

.file-item {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.file-ext {
  background: rgba(124,108,250,0.15);
  color: var(--accent2);
  width: 36px; height: 36px;
  border-radius: 8px;
  font-size: 11px;
  display: flex; 
  align-items: center; justify-content: center;
  font-weight: 700;
}

.file-name { font-size: 14px; font-weight: 500; }
.file-size { font-size: 12px; color: var(--muted); }

.badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; }
.badge-green { background: rgba(52,211,153,0.12); color: var(--green); }

.remove-btn {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--muted2);
  cursor: pointer;
}

/* STEPS */
.steps {
  display: flex;
  gap: 0;
  margin-bottom: 40px;
  position: relative;
}

.step {
  flex: 1;
  text-align: center;
  cursor: pointer;
}

.step-num {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: "Syne";
}

.step.active .step-num {
  background: var(--accent);
  color: #fff;
}

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* BUTTONS */
.btn-primary {
  padding: 12px 24px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
}

.btn-outline {
  padding: 10px 20px;
  border-radius: 10px;
  border: 0.5px solid var(--border2);
  background: var(--surface);
  color: white;
  cursor: pointer;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  padding: 12px 20px;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  color: white;
  opacity: 0;
  transition: 0.3s;
  border-radius: 10px;
}

#toast.show { opacity: 1; }

</style>
</head>

<body>

<!-- Background Blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrapper">

<header>
  <div class="logo">
    <div class="logo-dot"></div> StudySync
  </div>
  <div class="status-pill" id="serverStatus">
    <span>●</span> Connecting...
  </div>
</header>

<!-- Steps -->
<div class="steps">
  <div class="step active" id="step1" onclick="goStep(1)">
    <div class="step-num">1</div>
    <div class="step-label">Upload</div>
  </div>

  <div class="step" id="step2" onclick="goStep(2)">
    <div class="step-num">2</div>
    <div class="step-label">Analyze</div>
  </div>

  <div class="step" id="step3" onclick="goStep(3)">
    <div class="step-num">3</div>
    <div class="step-label">Merged Notes</div>
  </div>

  <div class="step" id="step4" onclick="goStep(4)">
    <div class="step-num">4</div>
    <div class="step-label">Download</div>
  </div>
</div>

<!-- PANEL 1 -->
<div class="panel active" id="panel1">

  <div class="section-title">Step 1 — PDF Upload Karein</div>

  <div class="upload-area" id="dropZone">
    <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx" onchange="handleFiles(this.files)">
    <div class="upload-icon">📂</div>
    <h3>Drag & Drop PDF Files</h3>
    <p>Ya click karke select karein</p>
  </div>

  <div class="file-list" id="fileList"></div>

  <div style="margin-top:24px; display:flex; gap:12px;">
    <button class="btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>⬆ Upload</button>
    <button class="btn-outline" onclick="loadDemo()">Demo Load</button>
  </div>

</div>

<!-- PANEL 2 -->
<div class="panel" id="panel2">
  <div class="section-title">Step 2 — Topic Analysis</div>
  <div id="topicsGrid"></div>

  <button class="btn-primary" style="margin-top:20px;" id="mergeBtn" onclick="mergeNotes()" disabled>
    ⚡ Merge Notes
  </button>
</div>

<!-- PANEL 3 -->
<div class="panel" id="panel3">
  <div class="section-title">Step 3 — Merged Notes</div>
  <div id="mergedGrid"></div>
  <button class="btn-primary" onclick="goStep(4)" style="margin-top:20px;">Next → Download</button>
</div>

<!-- PANEL 4 -->
<div class="panel" id="panel4">
  <div class="section-title">Download Your Notes</div>

  <button class="btn-outline" onclick="downloadFile('merged_notes.pdf')">⬇ PDF Download</button>
  <button class="btn-outline" onclick="downloadFile('merged_notes.txt')">⬇ TXT Download</button>
</div>

</div>

<div id="toast"></div>

<script>

// SAME JAVASCRIPT FUNCTIONALITY
// (Upload, Analyze, Merge, Download)

const API = "http://localhost:5000";
let uploadedFiles = [];
let analyzedTopics = [];
let currentStep = 1;

function goStep(n) {
  currentStep = n;
  document.querySelectorAll(".panel").forEach((p,i)=>p.classList.toggle("active", i+1 === n));
  document.querySelectorAll(".step").forEach((s,i)=>{
    s.classList.remove("active");
    if(i+1 === n) s.classList.add("active");
  });
}

function handleFiles(files) {
  for (const f of files) uploadedFiles.push(f);
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  uploadedFiles.forEach((f,i)=>{
    list.innerHTML += `
    <div class="file-item">
      <div class="file-ext">${f.name.split(".").pop().toUpperCase()}</div>
      <div>
        <div class="file-name">${f.name}</div>
      </div>
      <button class="remove-btn" onclick="removeFile(${i})">×</button>
    </div>`;
  });
  document.getElementById("uploadBtn").disabled = uploadedFiles.length === 0;
}

function removeFile(i) {
  uploadedFiles.splice(i,1);
  renderFileList();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

async function uploadFiles() {
  const form = new FormData();
  uploadedFiles.forEach(f=>form.append("files", f));

  const res = await fetch(API + "/upload", {
    method: "POST",
    body: form
  });

  showToast("Files Uploaded!");
  goStep(2);
  analyzeTopics();
}

async function analyzeTopics() {

  const res = await fetch(API + "/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      files: uploadedFiles.map(f=>f.name)
    })
  });

  const data = await res.json();
  analyzedTopics = data.topics;

  renderTopics(data.topics, "topicsGrid");
  document.getElementById("mergeBtn").disabled = false;
}

async function mergeNotes() {
  await fetch(API + "/merge",{
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      files: uploadedFiles.map(f=>f.name),
      format: "pdf"
    })
  });

  renderTopics(analyzedTopics, "mergedGrid");
  goStep(3);
}

function renderTopics(topics, id) {
  const grid = document.getElementById(id);
  grid.innerHTML = "";
  topics.forEach(t=>{
    grid.innerHTML += `
      <div style="background:var(--surface); padding:14px; border-radius:10px; margin-bottom:12px;">
        <h3>${t.topic}</h3>
        <p style="color:var(--muted); margin-top:6px;">${t.merged_text}</p>
      </div>`;
  });
}

function downloadFile(name) {
  window.open(API + "/download/" + name, "_blank");
  showToast("Download Started!");
}

function loadDemo() {
  uploadedFiles = [
    {name:"Physics.pdf"}, {name:"Notes.docx"}
  ];
  renderFileList();
  document.getElementById("uploadBtn").disabled = false;
  showToast("Demo Loaded!");
}

</script>

</body>
</html>
